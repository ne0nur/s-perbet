<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Atmospheric Background Layers -->
<div class="absolute inset-0 z-0">
<!-- Stadium Image Placeholder -->
<div class="w-full h-full bg-cover bg-center opacity-40 blur-sm" data-alt="A dark, moody, atmospheric wide shot of a professional football stadium at night. The pitch is deeply shadowed obsidian black #030712. Intense, glowing amber and gold spotlights #fbbf24 pierce downwards from the stadium roof structure, creating dramatic light leaks and a high-stakes, athletic vibe. The scene is slightly blurred to serve as an abstract background layer for a modern user interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAtff-yOcmlAl7Yp48nlZqCJn4YsVD0CUp3ah-ETc0HLhwKcXg1luzDMRKxWjXeh6T8deqbGAKtUbrHJ0sBx43pbxtwJLT_P_pil74ZsPy96_fAMUtGvBl7M3H8UOIiSdswZ9WEydhbq9BYIKaoZ4aHJFX_wyugD3iffm84Y8lYseamYYaHbDsdvJWWx_yPbRzvZHjKQ8v0b95wVCC-WHkqN2-Q4gyDybhnq-4vGef_96qhTmVHlOmGYL7so1ebUSQeI_h1-lRhIE3J')"></div>
<!-- Gradient Overlays for Depth and Vignette -->
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background opacity-90"></div>
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-primary-container/10 via-background/80 to-background"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[420px] px-margin-mobile">
<!-- Glassmorphism Login Card (Level 2 Elevation concept) -->
<div class="bg-surface-container/40 backdrop-blur-[20px] border border-white/5 rounded-xl p-lg md:p-xl flex flex-col gap-lg shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
<!-- Header Section -->
<div class="text-center flex flex-col items-center gap-sm">
<!-- Glowing Icon Accent -->
<div class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center border border-white/5 shadow-[0_0_20px_rgba(251,191,36,0.15)] mb-xs">
<span class="material-symbols-outlined text-[32px] text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary-fixed-dim uppercase tracking-tighter">
                    Süper Lig
                </h1>
<p class="font-data-label text-data-label text-on-surface-variant tracking-widest uppercase">
                    Secure Authentication
                </p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- E-Mail Input Group -->
<div class="flex flex-col gap-xs relative group">
<label class="font-data-label text-data-label text-on-surface-variant uppercase ml-xs" for="email">E-Mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors duration-300">mail</span>
<input class="w-full bg-surface-container-lowest/60 border border-outline-variant/40 rounded-lg py-sm pl-[44px] pr-sm text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/50 transition-all duration-300 placeholder:text-on-surface-variant/40" id="email" placeholder="manager@club.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-xs relative group mt-xs">
<label class="font-data-label text-data-label text-on-surface-variant uppercase ml-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-container transition-colors duration-300">key</span>
<input class="w-full bg-surface-container-lowest/60 border border-outline-variant/40 rounded-lg py-sm pl-[44px] pr-sm text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/50 transition-all duration-300 placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Links Row -->
<div class="flex justify-between items-center mt-[-4px]">
<div class="flex items-center gap-2">
<!-- Custom styled checkbox for visual consistency -->
<div class="relative flex items-center">
<input class="peer h-4 w-4 appearance-none rounded border border-outline-variant/60 bg-surface-container-lowest/60 checked:bg-primary-container checked:border-primary-container focus:outline-none focus:ring-1 focus:ring-primary-container/50 transition-colors cursor-pointer" id="remember" type="checkbox"/>
<span class="material-symbols-outlined absolute left-0 top-0 text-[16px] text-on-primary-container opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<label class="font-data-label text-data-label text-on-surface-variant cursor-pointer hover:text-on-surface transition-colors" for="remember">Remember me</label>
</div>
<a class="font-data-label text-data-label text-secondary hover:text-primary-container transition-colors duration-200" href="#">Forgot Password?</a>
</div>
<!-- Primary Submit Button (Level 3 Spotlight) -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-lg py-sm mt-sm hover:bg-primary-fixed hover:shadow-[0_0_20px_rgba(251,191,36,0.4)] active:scale-[0.98] active:shadow-[0_0_10px_rgba(251,191,36,0.2)] transition-all duration-200 shadow-[0_0_15px_rgba(251,191,36,0.15)] flex justify-center items-center gap-sm" type="button">
                    LOGIN
                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
</div>
<!-- Registration Prompt Below Card -->
<div class="text-center mt-md">
<p class="font-data-label text-data-label text-on-surface-variant">
                New to the platform? 
                <a class="text-primary-fixed-dim hover:text-primary transition-colors duration-200 uppercase tracking-wide ml-1 relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-full after:h-[1px] after:bg-primary-fixed-dim/50 after:scale-x-0 hover:after:scale-x-100 after:transition-transform after:duration-300" href="#">Register Here</a>
</p>
</div>

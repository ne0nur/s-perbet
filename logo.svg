<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <!-- Gold-Gradient für das Diamond -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2C94C"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <!-- Glow-Effekt -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Glow stark -->
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Diamond-Clip -->
    <clipPath id="diamondClip">
      <polygon points="60,10 110,60 60,110 10,60"/>
    </clipPath>
  </defs>

  <!-- === DIAMOND ICON (links) === -->
  <g transform="translate(0, 0)">
    <!-- Äußeres Diamond (Glow) -->
    <polygon
      points="60,4 116,60 60,116 4,60"
      fill="none"
      stroke="url(#goldGrad)"
      stroke-width="1.5"
      opacity="0.3"
    />

    <!-- Äußeres Diamond (solid) -->
    <polygon
      points="60,8 112,60 60,112 8,60"
      fill="none"
      stroke="url(#goldGrad)"
      stroke-width="2"
    />

    <!-- Linke Hälfte (dunkel) -->
    <polygon
      points="60,10 60,110 10,60"
      fill="url(#goldGrad)"
      opacity="0.15"
    />

    <!-- Rechte Hälfte (hell) -->
    <polygon
      points="60,10 110,60 60,110"
      fill="url(#goldGrad)"
      opacity="0.35"
    />

    <!-- Oberes Dreieck -->
    <polygon
      points="60,12 106,58 60,58"
      fill="url(#goldGrad)"
      opacity="0.6"
    />

    <!-- Unteres Dreieck (invertiert) -->
    <polygon
      points="60,62 106,62 60,108"
      fill="url(#goldGrad)"
      opacity="0.25"
    />

    <!-- Zentrale Linie -->
    <line x1="60" y1="14" x2="60" y2="106" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Mittlerer Punkt (Stadion-Flutlicht) -->
    <circle cx="60" cy="60" r="4" fill="#FBBF24" filter="url(#glowStrong)"/>
    <circle cx="60" cy="60" r="2" fill="#FFF"/>
  </g>

  <!-- === TEXT "SÜPER" (rechts oben) === -->
  <text
    x="140"
    y="52"
    font-family="'JetBrains Mono', 'Geist', monospace"
    font-size="36"
    font-weight="900"
    letter-spacing="8"
    fill="#F2C94C"
    filter="url(#glow)"
  >
    SÜPER
  </text>

  <!-- === TEXT "BET" (rechts unten) === -->
  <text
    x="140"
    y="92"
    font-family="'JetBrains Mono', 'Geist', monospace"
    font-size="36"
    font-weight="300"
    letter-spacing="12"
    fill="#94A3B8"
  >
    BET
  </text>

  <!-- Goldener Unterstrich -->
  <rect x="140" y="98" width="180" height="2" rx="1" fill="url(#goldGrad)" opacity="0.6"/>
</svg>

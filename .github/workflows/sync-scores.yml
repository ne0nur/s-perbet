name: Live-Scores Sync

# Läuft täglich alle 5 Minuten von 12:00-22:00 UTC
on:
  schedule:
    - cron: '*/5 12-22 * * *'  # Täglich, alle 5 Min, 12-22 UTC
  workflow_dispatch:  # Manuell triggerbar

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Live-Scores syncen
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_LEAGUE: '203'
          API_FOOTBALL_SEASON: '2026'
        run: node scripts/sync_scores.js

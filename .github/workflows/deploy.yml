name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master  # Löst aus, wenn du auf den master-Branch pushst

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Verhindert parallele Deploys
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies 🔧
        run: npm ci

      - name: Build 🏗️
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Der Ordner, den Vite erstellt
          branch: gh-pages # Der Branch, auf dem GitHub Pages gehostet wird

name: Süper Lig Fixtures Sync

on:
  schedule:
    - cron: '0 3 * * *'  # Täglich um 03:00 UTC
  workflow_dispatch:   # Manuell triggerbar

jobs:
  sync-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - run: npm ci

      - name: Spielplan importieren / aktualisieren
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_LEAGUE: '203'      # Süper Lig
          API_FOOTBALL_SEASON: '2026'      # Saison 2026/27
        run: node scripts/import_fixtures.js

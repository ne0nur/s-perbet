<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0e131f" />
    
    <!-- PWA Manifest & Service Worker -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <script>
      if ('serviceWorker' in navigator && !window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%BASE_URL%sw.js')
            .then(reg => console.log('ServiceWorker registered:', reg.scope))
            .catch(err => console.log('ServiceWorker registration failed:', err));
        });
      }
    </script>
    
    <!-- Google Fonts: Geist & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <title>SüperBET — Süper Lig Tipprunde</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
